name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    name: Validate extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate manifest.json is well-formed
        run: |
          for f in $(find extension -name manifest.json); do
            echo "Validating $f"
            python3 -c "import json,sys; json.load(open('$f')); print('  ok: valid JSON')"
          done

      - name: Check Manifest V3
        run: |
          for f in $(find extension -name manifest.json); do
            python3 -c "import json,sys; m=json.load(open('$f')); assert m.get('manifest_version')==3, 'not MV3'; print('  ok: manifest_version 3')"
          done

      - name: Lint JavaScript (syntax)
        run: |
          if ! command -v node >/dev/null; then echo "node not found"; exit 0; fi
          for f in $(find extension -name '*.js'); do
            echo "Checking $f"
            node --check "$f"
          done

      - name: Verify required docs exist
        run: |
          test -f README.md && echo "README.md present"
          test -f docs/PRD.md && echo "PRD present"
          test -f docs/design-system.md && echo "design-system present"
          test -d ai-skills && echo "ai-skills present"

# NOTE: move this file to .github/workflows/ci.yml to enable CI.
